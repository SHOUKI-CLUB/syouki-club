<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>正気倶楽部ホームページ</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        /* 作品リストのスタイル */
        .work-list {
            list-style: none;
            padding: 0;
        }
        .work-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 20px;
        }
        /* 画像の設定 */
        .work-item img {
            width: 200px; /* 画像の横幅 */
            height: auto;
            margin-right: 20px;
            border: 1px solid #000;
        }
        /* 説明文の設定 */
        .work-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }
        /* スマホで見るときは縦並びにする */
        @media (max-width: 600px) {
            .work-item {
                flex-direction: column;
            }
            .work-item img {
                margin-bottom: 15px;
                width: 100%;
            }
        }
    </style>
</head>
<body bgcolor="#FFFFFF" text="#000000">

    <h1>作品の紹介</h1>
    <hr>

    <div class="work-list">
        <div class="work-item">
            <img src="shiniku.png" alt="作品1">
            <div class="work-info">
                <h3>2022年『死肉』</h3>
                <p>説明文（編集中）</p>
            </div>
        </div>

        <div class="work-item">
            <img src="kinyuu.png" alt="作品2">
            <div class="work-info">
                <h3>2022年『金融』</h3>
                <p>2つ目の説明文（編集中）</p>
            </div>
        </div>

        <div class="work-item">
            <img src="ushioi.png" alt="作品3">
            <div class="work-info">
                <h3>2024年『牛追い』</h3>
                <p>3つ目の説明文（編集中）</p>
            </div>

        </div> 
　       <div class="work-item">
            <img src="god.png" alt="作品4">
            <div class="work-info">
                <h3>2024年『ガールズ・オン・デザート』</h3>
                <p>4つ目の説明文（編集中）</p>
            </div>
        </div>

        </div> 
　       <div class="work-item">
            <img src="seishun.png" alt="作品5">
            <div class="work-info">
                <h3>2025年『青春の涙』</h3>
                <p>Coming soon...</p>
            </div>
        </div>



        </div>

    <p><a href="index.html">トップページへ戻る</a></p>

</body>
</html>
