<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>正気倶楽部ホームページ</title>
    <style>
        /* 1. サイト全体のフォント設定（角ゴシック） */
        body {
            margin: 20px;
            background-color: #FFFFFF;
            /* モダンな角ゴシック体。メイリオ、游ゴシック等を優先。 */
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", "sans-serif";
            color: #000000;
            line-height: 1.6;
            overflow-x: hidden; /* 横スクロールバーが表示されないように制御 */
        }

        /* アニメーションの定義：右から左へ */
        @keyframes slideLeft {
            from { transform: translate(100vw, -50%); }
            to { transform: translate(-100%, -50%); }
        }

        /* 2. 背景に「正気」を固定する設定（角ゴシック版・アニメーション付き） */
        body::before {
            content: "正気";
            position: fixed;
            top: 50%;
            left: 0;
            /* transform は animation 内で上書きされます */
            z-index: -1;
            
            font-size: 60vw;
            font-weight: 900;
            white-space: nowrap;
            
            font-family: "Arial Black", "Hiragino Sans", "Meiryo", sans-serif;
            
            background: linear-gradient(
                to right, 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            
            opacity: 0.08;
            pointer-events: none;

            /* アニメーション設定：10秒かけて等速で無限ループ */
            animation: slideLeft 10s linear infinite;
        }

        /* 3. メニューの間隔設定 */
        .menu-link {
            display: block;
            margin-bottom: 12px;
            text-decoration: none;
            font-size: 1.05em;
            font-weight: bold;
        }
        .menu-link:hover {
            text-decoration: underline;
            color: #ff0000;
        }

        table {
            border-collapse: collapse;
        }
        
        a {
            color: #0000EE;
        }

        h1, h2 {
            font-weight: bold;
            display: inline-block;
            padding-bottom: 3px;
            margin-top: 0;
        }
    </style>
</head>
